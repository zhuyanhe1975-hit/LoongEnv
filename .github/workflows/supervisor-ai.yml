name: SUPERVISOR_AI

on:
  workflow_dispatch:
  schedule:
    - cron: "10 0 * * *"

permissions:
  contents: write

jobs:
  update-status-board:
    runs-on: ubuntu-latest
    env:
      OWNER: ${{ github.repository_owner }}
      REPOS: ZHAO_SZ WANG_CZ ZHU_YH
      GITHUB_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate daily status board
        run: bash .github/scripts/supervisor_ai.sh

      - name: Commit changes
        run: |
          if git diff --quiet -- docs/daily-status-board.md; then
            echo "No changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/daily-status-board.md
          git commit -m "SUPERVISOR_AI update daily status board"
          git push
